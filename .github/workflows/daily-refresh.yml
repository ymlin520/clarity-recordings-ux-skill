name: Daily Clarity Dashboard Refresh

on:
  schedule:
    # Asia/Taipei 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Build clarity cache
        run: php refresh-dashboard.php

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard-cache.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: daily refresh clarity dashboard cache"
          git push
